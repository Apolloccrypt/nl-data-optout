baseURL = "https://data-optout.stensel.nl/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[languages]
  [languages.en]
    languageCode = "en"
    languageName = "English"
    title = "OptOut EU"
    weight = 1
    [languages.en.params]
      description = "Generate GDPR requests to 60+ European data brokers in minutes. Runs 100% locally — no data stored."

  [languages.nl]
    languageCode = "nl"
    languageName = "Nederlands"
    title = "OptOut EU"
    weight = 2
    [languages.nl.params]
      description = "Genereer GDPR-verzoeken naar 60+ Europese data brokers in minuten. 100% lokaal — geen data opgeslagen."

[params]
  github = "https://github.com/Stensel8/data-optout"
  version = "2.0.0"
