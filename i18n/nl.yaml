about_title: "Over dit project"
about_intro: "Dit project verzamelt en analyseert openbare data om te laten zien hoe Europese bedrijven omgaan met persoonsgegevens."
about_goals_title: "Doelen"
about_goal1: "Transparantie bieden over cookie-tracking, dark patterns en onnodige dataopslag"
about_goal2: "Bewijs leveren voor wetgevingsinitiatieven voor betere gegevensbescherming (bijv. Check Don't Store)"
about_goal3: "Burgers praktische tools geven om hun AVG-rechten uit te oefenen"
about_footer: "Alles is gebaseerd op reproduceerbaar technisch onderzoek. Na analyse wordt alles permanent verwijderd."

