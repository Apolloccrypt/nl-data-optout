art15_title: "Art. 15 — Recht op inzage"
art15_text: "Je hebt het recht om te weten of een bedrijf jouw persoonsgegevens verwerkt en, zo ja, een volledige kopie van die gegevens te ontvangen."
art15_url_info: "https://gdpr-info.eu/art-15-gdpr/"
art15_url_ap: "https://autoriteitpersoonsgegevens.nl/themas/basis-avg/privacyrechten-avg/recht-op-inzage"

art17_title: "Art. 17 — Recht op vergetelheid"
art17_text: "Je hebt het recht te eisen dat een bedrijf al jouw persoonsgegevens zonder onnodig uitstel verwijdert. Ook wel het \"recht om vergeten te worden\" genoemd."
art17_url_info: "https://gdpr-info.eu/art-17-gdpr/"
art17_url_ap: "https://autoriteitpersoonsgegevens.nl/themas/basis-avg/privacyrechten-avg/recht-op-gegevens-verwijderen"

art21_title: "Art. 21 — Recht van bezwaar"
art21_text: "Je hebt het recht om te allen tijde bezwaar te maken tegen de verwerking van jouw persoonsgegevens voor marketing, profilering of tracking. De verwerkingsverantwoordelijke moet stoppen, tenzij hij dwingende gerechtvaardigde gronden kan aantonen."
art21_url_info: "https://gdpr-info.eu/art-21-gdpr/"
art21_url_ap: "https://autoriteitpersoonsgegevens.nl/themas/basis-avg/privacyrechten-avg/recht-van-bezwaar"

