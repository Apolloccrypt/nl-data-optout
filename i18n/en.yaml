rights_title: "Your GDPR rights"
rights_official_text: "Official text"
rights_ap_page: "NL authority"
rights_eurlex: "EUR-Lex full regulation"

art15_title: "Art. 15 — Right of access"
art15_text: "You have the right to know whether a company processes your personal data and, if so, to receive a complete copy of that data."
art15_url_info: "https://gdpr-info.eu/art-15-gdpr/"
art15_url_ap: "https://autoriteitpersoonsgegevens.nl/themas/basis-avg/privacyrechten-avg/recht-op-inzage"

art17_title: "Art. 17 — Right to erasure"
art17_text: "You have the right to request deletion of all personal data a company holds about you, without undue delay. Also known as the \"right to be forgotten\"."
art17_url_info: "https://gdpr-info.eu/art-17-gdpr/"
art17_url_ap: "https://autoriteitpersoonsgegevens.nl/themas/basis-avg/privacyrechten-avg/recht-op-vergetelheid"

art21_title: "Art. 21 — Right to object"
art21_text: "You have the right to object at any time to the processing of your personal data for marketing, profiling or tracking. The controller must stop unless it can demonstrate compelling legitimate grounds."
art21_url_info: "https://gdpr-info.eu/art-21-gdpr/"
art21_url_ap: "https://autoriteitpersoonsgegevens.nl/themas/basis-avg/privacyrechten-avg/recht-van-bezwaar"

