about_title: "About this project"
about_intro: "This tool collects and analyses public data to show how European companies handle personal data."
about_goals_title: "Goals"
about_goal1: "Provide transparency about cookie tracking, dark patterns and unnecessary data storage"
about_goal2: "Support legislative efforts for stronger data protection (e.g. Check Don't Store)"
about_goal3: "Give citizens practical tools to exercise their GDPR rights"
about_footer: "Everything is based on reproducible technical research. No data is retained or distributed after analysis."

